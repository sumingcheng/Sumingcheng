# 工作流名称
name: Cache Metrics Image

# 触发条件
on:
  # 当推送到main分支时触发
  push:
    branches:
      - main # 假设您的主分支名为"main"
  # 按计划触发，每天的6点和18点
  schedule:
    - cron: '0 6,18 * * *'

# 任务定义
jobs:
  cache-metrics:
    # 运行环境
    runs-on: ubuntu-latest

    # 执行步骤
    steps:
      # 检出仓库代码
      - name: Checkout repository
        uses: actions/checkout@v2

      # 生成Metrics图片
      - name: Generate Metrics image
        run: |
          # 使用curl或其他工具获取Metrics图片并保存到您的仓库
          curl -o metrics.png "YOUR_METRICS_URL"

      # 提交并推送更改
      - name: Commit and push changes
        run: |
          # 设置Git用户邮箱和用户名
          git config --local user.email "cjwdyzdyplxjg@gmail.com"
          git config --local user.name "sumingcheng"
          # 添加文件到Git
          git add metrics.png
          # 提交更改
          git commit -m "Update cached Metrics image: $(date '+%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          # 推送更改
          git push
